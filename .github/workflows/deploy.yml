name: Build & Push DeerFlow

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/deer-flow

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate config.yaml with custom models
        run: |
          cp config.example.yaml config.yaml
          cat > /tmp/patch_config.py << 'PYEOF'
          import yaml

          with open("config.yaml", "r") as f:
              config = yaml.safe_load(f)

          config["models"] = [
              {"name": "gemini-3-flash", "display_name": "Gemini 3 Flash", "use": "langchain_openai:ChatOpenAI", "model": "gemini-3-flash", "api_key": "$OPENAI_API_KEY", "base_url": "$OPENAI_BASE_URL", "max_tokens": 8192, "temperature": 0.7, "supports_thinking": True},
              {"name": "gemini-3.1-pro-high", "display_name": "Gemini 3.1 Pro (High)", "use": "langchain_openai:ChatOpenAI", "model": "gemini-3.1-pro-high", "api_key": "$OPENAI_API_KEY", "base_url": "$OPENAI_BASE_URL", "max_tokens": 8192, "temperature": 0.7, "supports_thinking": True},
              {"name": "gemini-3.1-pro-low", "display_name": "Gemini 3.1 Pro (Low)", "use": "langchain_openai:ChatOpenAI", "model": "gemini-3.1-pro-low", "api_key": "$OPENAI_API_KEY", "base_url": "$OPENAI_BASE_URL", "max_tokens": 8192, "temperature": 0.7, "supports_thinking": True},
              {"name": "claude-sonnet-4-6", "display_name": "Claude Sonnet 4.6", "use": "langchain_openai:ChatOpenAI", "model": "claude-sonnet-4-6", "api_key": "$OPENAI_API_KEY", "base_url": "$OPENAI_BASE_URL", "max_tokens": 8192, "temperature": 0.7, "supports_thinking": True},
              {"name": "claude-opus-4-6-thinking", "display_name": "Claude Opus 4.6 (Thinking)", "use": "langchain_openai:ChatOpenAI", "model": "claude-opus-4-6-thinking", "api_key": "$OPENAI_API_KEY", "base_url": "$OPENAI_BASE_URL", "max_tokens": 8192, "temperature": 0.7, "supports_thinking": True},
              {"name": "mistral-medium-2505", "display_name": "Mistral Medium", "use": "langchain_openai:ChatOpenAI", "model": "mistral-medium-2505", "api_key": "$OPENAI_API_KEY", "base_url": "$OPENAI_BASE_URL", "max_tokens": 8192, "temperature": 0.7, "supports_thinking": True},
              {"name": "sonar", "display_name": "Sonar", "use": "langchain_openai:ChatOpenAI", "model": "sonar", "api_key": "$OPENAI_API_KEY", "base_url": "$OPENAI_BASE_URL", "max_tokens": 4096, "temperature": 0.7},
              {"name": "sonar-pro", "display_name": "Sonar Pro", "use": "langchain_openai:ChatOpenAI", "model": "sonar-pro", "api_key": "$OPENAI_API_KEY", "base_url": "$OPENAI_BASE_URL", "max_tokens": 4096, "temperature": 0.7},
              {"name": "sonar-reasoning", "display_name": "Sonar Reasoning", "use": "langchain_openai:ChatOpenAI", "model": "sonar-reasoning", "api_key": "$OPENAI_API_KEY", "base_url": "$OPENAI_BASE_URL", "max_tokens": 4096, "temperature": 0.7, "supports_thinking": True},
          ]

          for tool in config.get("tools", []):
              if tool.get("name") == "web_search":
                  tool["use"] = "deerflow.community.searxng.tools:web_search_tool"
                  tool["base_url"] = "http://searxng:8080"
              elif tool.get("name") == "web_fetch":
                  tool["use"] = "deerflow.community.webclaw.tools:web_fetch_tool"
                  tool["webclaw_bin"] = "/usr/local/bin/webclaw"
                  tool["timeout"] = 30

          with open("config.yaml", "w") as f:
              yaml.dump(config, f, default_flow_style=False, allow_unicode=True, sort_keys=False)
          print("✓ config.yaml patched")
          PYEOF
          pip install pyyaml -q && python3 /tmp/patch_config.py

      - name: Create extensions_config.json
        run: echo '{"mcpServers":{},"skills":{}}' > extensions_config.json

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend image (with config baked in)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-backend:latest
            ${{ env.IMAGE_PREFIX }}-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          target: prod
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-frontend:latest
            ${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push nginx image
        uses: docker/build-push-action@v6
        with:
          context: docker/nginx
          file: docker/nginx/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-nginx:latest
            ${{ env.IMAGE_PREFIX }}-nginx:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
