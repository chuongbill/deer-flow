# DeerFlow Production Config (Coolify) - via LiteLLM Proxy
config_version: 3
log_level: warning

token_usage:
  enabled: true

models:
  - name: gemini-3.1-flash-lite-preview
    display_name: Gemini 3.1 Flash Lite (Cheapest)
    use: langchain_openai:ChatOpenAI
    model: gemini-3.1-flash-lite-preview
    api_key: $OPENAI_API_KEY
    base_url: $OPENAI_BASE_URL
    temperature: 0.7
    supports_thinking: false
    supports_vision: true

  - name: gemini-3-flash-preview
    display_name: Gemini 3 Flash
    use: langchain_openai:ChatOpenAI
    model: gemini-3-flash-preview
    api_key: $OPENAI_API_KEY
    base_url: $OPENAI_BASE_URL
    temperature: 0.7
    supports_thinking: false
    supports_vision: true

  - name: gemini-3.1-pro-preview
    display_name: Gemini 3.1 Pro (Thinking)
    use: deerflow.models.patched_openai:PatchedChatOpenAI
    model: gemini-3.1-pro-preview
    api_key: $OPENAI_API_KEY
    base_url: $OPENAI_BASE_URL
    temperature: 0.7
    supports_thinking: true
    supports_vision: true
    when_thinking_enabled:
      extra_body:
        thinking:
          type: enabled
          thinking_budget: 8192

  # ── 9Router Models (OpenAI-compatible codex) ──────────────────────────────
  - name: cx-gpt-5.4
    display_name: "GPT-5.4 (9Router)"
    use: deerflow.models.patched_openai:PatchedChatOpenAI
    model: cx/gpt-5.4
    api_key: $ROUTER9_API_KEY
    base_url: $ROUTER9_BASE_URL
    temperature: 0.7
    supports_thinking: true
    supports_vision: true
    when_thinking_enabled:
      extra_body:
        thinking:
          type: enabled
          thinking_budget: 8192

  - name: cx-gpt-5.3-codex-high
    display_name: "GPT-5.3 Codex High (9Router)"
    use: deerflow.models.patched_openai:PatchedChatOpenAI
    model: cx/gpt-5.3-codex-high
    api_key: $ROUTER9_API_KEY
    base_url: $ROUTER9_BASE_URL
    temperature: 0.7
    supports_thinking: true
    supports_vision: true
    when_thinking_enabled:
      extra_body:
        thinking:
          type: enabled
          thinking_budget: 8192

  - name: cx-gpt-5.3-codex
    display_name: "GPT-5.3 Codex (9Router)"
    use: deerflow.models.patched_openai:PatchedChatOpenAI
    model: cx/gpt-5.3-codex
    api_key: $ROUTER9_API_KEY
    base_url: $ROUTER9_BASE_URL
    temperature: 0.7
    supports_thinking: true
    supports_vision: true
    when_thinking_enabled:
      extra_body:
        thinking:
          type: enabled
          thinking_budget: 8192

  # ── GitHub Copilot Models (via 9Router, gh/ prefix) ───────────────────────
  - name: gh-claude-sonnet-4.6
    display_name: "Claude Sonnet 4.6 (GitHub)"
    use: deerflow.models.patched_openai:PatchedChatOpenAI
    model: gh/claude-sonnet-4.6
    api_key: $ROUTER9_API_KEY
    base_url: $ROUTER9_BASE_URL
    supports_thinking: true
    supports_vision: true
    when_thinking_enabled:
      extra_body:
        thinking:
          type: enabled
          thinking_budget: 8192

  - name: gh-claude-opus-4.6
    display_name: "Claude Opus 4.6 (GitHub)"
    use: deerflow.models.patched_openai:PatchedChatOpenAI
    model: gh/claude-opus-4.6
    api_key: $ROUTER9_API_KEY
    base_url: $ROUTER9_BASE_URL
    supports_thinking: true
    supports_vision: true
    when_thinking_enabled:
      extra_body:
        thinking:
          type: enabled
          thinking_budget: 8192

  - name: gh-gemini-3-flash-preview
    display_name: "Gemini 3 Flash (GitHub)"
    use: langchain_openai:ChatOpenAI
    model: gh/gemini-3-flash-preview
    api_key: $ROUTER9_API_KEY
    base_url: $ROUTER9_BASE_URL
    supports_thinking: false
    supports_vision: true

  - name: gh-gpt-5.4
    display_name: "GPT-5.4 (GitHub)"
    use: deerflow.models.patched_openai:PatchedChatOpenAI
    model: gh/gpt-5.4
    api_key: $ROUTER9_API_KEY
    base_url: $ROUTER9_BASE_URL
    supports_thinking: true
    supports_vision: true
    when_thinking_enabled:
      extra_body:
        thinking:
          type: enabled
          thinking_budget: 8192

tool_groups:
  - name: web
  - name: file:read
  - name: file:write
  - name: bash

tools:
  # Web search (self-hosted SearXNG — aggregates Google, Bing, DDG, and more)
  - name: web_search
    group: web
    use: deerflow.community.searxng.tools:web_search_tool
    base_url: http://searxng:8080
    max_results: 5

  # Web fetch (self-hosted Webclaw CLI — 67% fewer tokens, 95% accuracy)
  - name: web_fetch
    group: web
    use: deerflow.community.webclaw.tools:web_fetch_tool
    webclaw_bin: /usr/local/bin/webclaw
    timeout: 30

  - name: image_search
    group: web
    use: deerflow.community.image_search.tools:image_search_tool
    max_results: 5
    timeout: 10

  - name: ls
    group: file:read
    use: deerflow.sandbox.tools:ls_tool

  - name: read_file
    group: file:read
    use: deerflow.sandbox.tools:read_file_tool

  - name: write_file
    group: file:write
    use: deerflow.sandbox.tools:write_file_tool

  - name: str_replace
    group: file:write
    use: deerflow.sandbox.tools:str_replace_tool

  - name: bash
    group: bash
    use: deerflow.sandbox.tools:bash_tool
    timeout: 60

subagents:
  timeout_seconds: 600

tool_search:
  enabled: false

sandbox:
  use: deerflow.sandbox.local:LocalSandboxProvider

skills:
  container_path: /mnt/skills

title:
  enabled: true
  max_words: 6
  max_chars: 60
  model_name: null

summarization:
  enabled: true
  model_name: cx-gpt-5.3-codex
  trigger:
    - type: tokens
      value: 16000
  keep:
    type: messages
    value: 15
  trim_tokens_to_summarize: 16000
  summary_prompt: null

memory:
  enabled: true
  storage_path: .deer-flow/memory.json
  debounce_seconds: 30
  model_name: cx-gpt-5.3-codex
  max_facts: 100
  fact_confidence_threshold: 0.7
  injection_enabled: true
  max_injection_tokens: 2000

checkpointer:
  type: sqlite
  connection_string: .deer-flow/checkpoints.db
