# DeerFlow Production Config (Coolify) - Direct Gemini API
config_version: 3
log_level: warning

token_usage:
  enabled: true

models:
  - name: gemini-3-flash-preview
    display_name: Gemini 3 Flash
    use: langchain_openai:ChatOpenAI
    model: gemini-3-flash-preview
    api_key: $GEMINI_API_KEY
    base_url: https://generativelanguage.googleapis.com/v1beta/openai/
    max_tokens: 8192
    temperature: 0.7
    supports_thinking: false
    supports_vision: true

  - name: gemini-3.1-pro-preview
    display_name: Gemini 3.1 Pro
    use: langchain_openai:ChatOpenAI
    model: gemini-3.1-pro-preview
    api_key: $GEMINI_API_KEY
    base_url: https://generativelanguage.googleapis.com/v1beta/openai/
    max_tokens: 8192
    temperature: 0.7
    supports_thinking: true
    supports_vision: true

tool_groups:
  - name: web
  - name: file:read
  - name: file:write
  - name: bash

tools:
  - name: web_search
    group: web
    use: deerflow.community.firecrawl.tools:web_search_tool
    max_results: 5

  - name: web_fetch
    group: web
    use: deerflow.community.firecrawl.tools:web_fetch_tool

  - name: image_search
    group: web
    use: deerflow.community.image_search.tools:image_search_tool
    max_results: 5

  - name: ls
    group: file:read
    use: deerflow.sandbox.tools:ls_tool

  - name: read_file
    group: file:read
    use: deerflow.sandbox.tools:read_file_tool

  - name: write_file
    group: file:write
    use: deerflow.sandbox.tools:write_file_tool

  - name: str_replace
    group: file:write
    use: deerflow.sandbox.tools:str_replace_tool

  - name: bash
    group: bash
    use: deerflow.sandbox.tools:bash_tool

tool_search:
  enabled: false

sandbox:
  use: deerflow.sandbox.local:LocalSandboxProvider

skills:
  container_path: /mnt/skills

title:
  enabled: true
  max_words: 6
  max_chars: 60
  model_name: null

summarization:
  enabled: true
  model_name: null
  trigger:
    - type: tokens
      value: 32000
  keep:
    type: messages
    value: 15
  trim_tokens_to_summarize: 32000
  summary_prompt: null

memory:
  enabled: true
  storage_path: .deer-flow/memory.json
  debounce_seconds: 30
  model_name: null
  max_facts: 100
  fact_confidence_threshold: 0.7
  injection_enabled: true
  max_injection_tokens: 2000

checkpointer:
  type: sqlite
  connection_string: .deer-flow/checkpoints.db
