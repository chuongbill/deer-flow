# SearXNG settings for DeerFlow
# Docs: https://docs.searxng.org/admin/settings/

# Use defaults but REMOVE engines that crash on load (no Tor available)
use_default_settings:
  engines:
    remove:
      - ahmia
      - torch

general:
  instance_name: "DeerFlow Search"

server:
  secret_key: "change-me-to-a-random-string"
  port: 8080
  bind_address: "0.0.0.0"
  limiter: false
  method: "GET"

engines:
  - name: google
    engine: google
    shortcut: g

  - name: bing
    engine: bing
    shortcut: b

  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg

  - name: wikipedia
    engine: wikipedia
    shortcut: wp
