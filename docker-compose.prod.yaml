# DeerFlow Production - Uses pre-built images from ghcr.io
# Deploy via Coolify with bind mounts for editable config files

services:
  nginx:
    image: ghcr.io/chuongbill/deer-flow-nginx:latest
    expose:
      - "2026"
    depends_on:
      frontend:
        condition: service_healthy
      gateway:
        condition: service_healthy
      langgraph:
        condition: service_healthy
    networks:
      - deer-flow
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:2026"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    image: ghcr.io/chuongbill/deer-flow-frontend:latest
    environment:
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_BASE_URL=${BETTER_AUTH_BASE_URL}
      - BETTER_AUTH_URL=${BETTER_AUTH_BASE_URL}
    networks:
      - deer-flow
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 3

  gateway:
    image: ghcr.io/chuongbill/deer-flow-backend:latest
    command: sh -c "cd backend && PYTHONPATH=. uv run uvicorn app.gateway.app:app --host 0.0.0.0 --port 8001 --workers 2"
    volumes:
      - type: bind
        source: ./config.yaml
        target: /app/backend/config.yaml
      - type: bind
        source: ./extensions_config.json
        target: /app/backend/extensions_config.json
      - deer-flow-data:/app/backend/.deer-flow
    working_dir: /app
    environment:
      - CI=true
      - DEER_FLOW_HOME=/app/backend/.deer-flow
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
    networks:
      - deer-flow
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  langgraph:
    image: ghcr.io/chuongbill/deer-flow-backend:latest
    command: sh -c "cd /app/backend && uv run langgraph dev --no-browser --allow-blocking --no-reload --host 0.0.0.0 --port 2024"
    volumes:
      - type: bind
        source: ./config.yaml
        target: /app/config.yaml
      - type: bind
        source: ./extensions_config.json
        target: /app/extensions_config.json
      - deer-flow-data:/app/backend/.deer-flow
    environment:
      - CI=true
      - DEER_FLOW_HOME=/app/backend/.deer-flow
      - DEER_FLOW_CONFIG_PATH=/app/config.yaml
      - DEER_FLOW_EXTENSIONS_CONFIG_PATH=/app/extensions_config.json
      - LANGCHAIN_TRACING_V2=${LANGCHAIN_TRACING_V2:-false}
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
    networks:
      - deer-flow
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:2024/ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

volumes:
  deer-flow-data:

networks:
  deer-flow:
    driver: bridge
