# DeerFlow Production - Uses pre-built images from ghcr.io
# Deploy via Coolify with bind mounts for editable config files

services:
  searxng:
    image: searxng/searxng:latest
    volumes:
      - type: bind
        source: ./docker/searxng/settings.yml
        target: /etc/searxng/settings.yml
      - type: bind
        source: ./docker/searxng/limiter.toml
        target: /etc/searxng/limiter.toml
    environment:
      - SEARXNG_LIMITER=false
    networks:
      - deer-flow
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "--header=X-Real-IP: 127.0.0.1", "http://localhost:8080"]
      interval: 30s
      timeout: 5s
      retries: 3

  nginx:
    image: ghcr.io/chuongbill/deer-flow-nginx:latest
    expose:
      - "2026"
    environment:
      - LANGGRAPH_UPSTREAM=${LANGGRAPH_UPSTREAM:-langgraph:2024}
      - LANGGRAPH_REWRITE=${LANGGRAPH_REWRITE:-/}
    command: >
      sh -c "envsubst '$$LANGGRAPH_UPSTREAM $$LANGGRAPH_REWRITE'
      < /etc/nginx/nginx.conf.template > /etc/nginx/nginx.conf
      && nginx -g 'daemon off;'"
    labels:
      - "traefik.http.middlewares.deerflow-auth.basicauth.users=chuong:$2y$12$shpBXrZXqkoxY21d7YhWeOq7Y8M6jlYqO5cuFacXre6X3IWP2E/RC"
      - "traefik.http.routers.https-0-bfypytp9rkzww2tlfiexe90f-nginx.middlewares=gzip,deerflow-auth"
    depends_on:
      frontend:
        condition: service_healthy
      gateway:
        condition: service_healthy
    networks:
      - deer-flow
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:2026"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    image: ghcr.io/chuongbill/deer-flow-frontend:latest
    environment:
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_BASE_URL=${BETTER_AUTH_BASE_URL}
      - BETTER_AUTH_URL=${BETTER_AUTH_BASE_URL}
    networks:
      - deer-flow
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 3

  gateway:
    image: ghcr.io/chuongbill/deer-flow-backend:latest
    command: sh -c "cd backend && PYTHONPATH=. uv run uvicorn app.gateway.app:app --host 0.0.0.0 --port 8001 --workers $${GATEWAY_WORKERS:-4}"
    volumes:
      - deer-flow-data:/app/backend/.deer-flow
      - type: bind
        source: ./skills
        target: /app/skills
      - type: bind
        source: ./config.prod.yaml
        target: /app/config.yaml
    working_dir: /app
    environment:
      - CI=true
      - DEER_FLOW_HOME=/app/backend/.deer-flow
      - DEER_FLOW_CONFIG_PATH=/app/config.yaml
      - DEER_FLOW_EXTENSIONS_CONFIG_PATH=/app/extensions_config.json
      - DEER_FLOW_CHANNELS_LANGGRAPH_URL=${DEER_FLOW_CHANNELS_LANGGRAPH_URL:-http://langgraph:2024}
      - DEER_FLOW_CHANNELS_GATEWAY_URL=${DEER_FLOW_CHANNELS_GATEWAY_URL:-http://gateway:8001}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_BASE_URL=${GEMINI_BASE_URL:-https://generativelanguage.googleapis.com/v1beta/openai/}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - ROUTER9_API_KEY=${ROUTER9_API_KEY}
      - ROUTER9_BASE_URL=${ROUTER9_BASE_URL}
      - VLLM_API_KEY=${VLLM_API_KEY}
    networks:
      - deer-flow
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  langgraph:
    image: ghcr.io/chuongbill/deer-flow-backend:latest
    command: sh -c 'cd /app/backend && args="--no-browser --no-reload --host 0.0.0.0 --port 2024 --n-jobs-per-worker ${LANGGRAPH_JOBS_PER_WORKER:-10}" && if [ "${LANGGRAPH_ALLOW_BLOCKING:-0}" = "1" ]; then args="$$args --allow-blocking"; fi && uv run langgraph dev $$args'
    volumes:
      - deer-flow-data:/app/backend/.deer-flow
      - type: bind
        source: ./skills
        target: /app/skills
      - type: bind
        source: ./config.prod.yaml
        target: /app/config.yaml
    environment:
      - CI=true
      - DEER_FLOW_HOME=/app/backend/.deer-flow
      - DEER_FLOW_CONFIG_PATH=/app/config.yaml
      - DEER_FLOW_EXTENSIONS_CONFIG_PATH=/app/extensions_config.json
      - LANGCHAIN_TRACING_V2=${LANGCHAIN_TRACING_V2:-false}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_BASE_URL=${GEMINI_BASE_URL:-https://generativelanguage.googleapis.com/v1beta/openai/}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - ROUTER9_API_KEY=${ROUTER9_API_KEY}
      - ROUTER9_BASE_URL=${ROUTER9_BASE_URL}
      - VLLM_API_KEY=${VLLM_API_KEY}
    networks:
      - deer-flow
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:2024/ok')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

volumes:
  deer-flow-data:

networks:
  deer-flow:
    driver: bridge
